<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kişilik Testi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --sari: #F5C542;
  --kirmizi: #E74C3C;
  --mavi: #3498DB;
  --yesil: #2ECC71;
  --sari-soft: #FFF8E1;
  --kirmizi-soft: #FDEDEC;
  --mavi-soft: #EBF5FB;
  --yesil-soft: #EAFAF1;
  --bg: #FAFAF7;
  --card: #FFFFFF;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --border: #e8e5df;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 30px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 4px;
  background: linear-gradient(90deg, var(--sari), var(--kirmizi), var(--mavi), var(--yesil));
  border-radius: 2px;
}

.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2em;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--kirmizi), #c0392b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  color: var(--text-secondary);
  font-size: 0.95em;
  max-width: 520px;
  margin: 0 auto;
}

/* PROGRESS */
.progress-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250,250,247,0.92);
  backdrop-filter: blur(10px);
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.progress-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sari), var(--kirmizi), var(--mavi), var(--yesil));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

.progress-text {
  font-size: 0.8em;
  color: var(--text-secondary);
  text-align: center;
  font-weight: 500;
}

/* SECTION DIVIDER */
.section-divider {
  text-align: center;
  margin: 32px 0 20px;
  padding: 14px 24px;
  background: linear-gradient(135deg, #f7f5f0, #ede9e0);
  border-radius: 12px;
  font-family: 'DM Serif Display', serif;
  font-size: 1.1em;
  color: var(--text-secondary);
}

/* QUESTION ROW */
.question-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 10px;
  transition: all 0.25s ease;
  box-shadow: var(--shadow);
}

.question-row:hover {
  border-color: #d0cdc5;
}

.question-row.answered {
  border-color: #c8e6c9;
  background: #fdfefd;
}

.question-row.error {
  border-color: var(--kirmizi);
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.q-number {
  font-family: 'DM Serif Display', serif;
  font-size: 0.85em;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.q-number span {
  display: inline-block;
  width: 24px; height: 24px;
  background: linear-gradient(135deg, #f0ede6, #e8e5dd);
  border-radius: 6px;
  text-align: center;
  line-height: 24px;
  font-size: 0.85em;
  font-weight: 600;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (min-width: 560px) {
  .options-grid { grid-template-columns: repeat(4, 1fr); }
}

.option-btn {
  position: relative;
  padding: 10px 10px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  cursor: pointer;
  text-align: center;
  font-size: 0.82em;
  font-weight: 500;
  color: var(--text);
  transition: all 0.2s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  word-break: break-word;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
}

.option-btn:hover {
  border-color: #bbb;
  background: #f5f3ee;
  transform: translateY(-1px);
}

.option-btn.selected-sari {
  border-color: var(--sari);
  background: var(--sari-soft);
  color: #8b6914;
  box-shadow: 0 0 0 1px var(--sari);
}
.option-btn.selected-kirmizi {
  border-color: var(--kirmizi);
  background: var(--kirmizi-soft);
  color: #922b21;
  box-shadow: 0 0 0 1px var(--kirmizi);
}
.option-btn.selected-mavi {
  border-color: var(--mavi);
  background: var(--mavi-soft);
  color: #21618c;
  box-shadow: 0 0 0 1px var(--mavi);
}
.option-btn.selected-yesil {
  border-color: var(--yesil);
  background: var(--yesil-soft);
  color: #1e8449;
  box-shadow: 0 0 0 1px var(--yesil);
}

/* SUBMIT */
.submit-section {
  text-align: center;
  margin-top: 30px;
}

.submit-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 1.1em;
  font-weight: 700;
  padding: 16px 56px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--kirmizi), #c0392b);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(231,76,60,0.3);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(231,76,60,0.4);
}

.submit-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

.error-msg {
  color: var(--kirmizi);
  margin-top: 12px;
  font-size: 0.9em;
  font-weight: 500;
}

/* RESULTS */
.results-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.results-card {
  background: white;
  border-radius: 24px;
  max-width: 580px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 36px 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.4s cubic-bezier(.4,0,.2,1);
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.results-card h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 24px;
}

.color-result {
  margin-bottom: 18px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.color-result-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: background 0.2s;
}

.color-result-header:hover { background: #fafafa; }

.color-dot {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-size: 1.1em;
}

.rank-badge {
  position: absolute;
  top: -4px; right: -4px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--text);
  color: white;
  font-size: 0.55em;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.color-info {
  flex: 1;
}

.color-info h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15em;
  margin-bottom: 2px;
}

.color-info .subtitle {
  font-size: 0.82em;
  color: var(--text-secondary);
  font-weight: 500;
}

.score-bar-container {
  width: 100px;
  height: 8px;
  background: #eee;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}

.score-bar-inner {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}

.score-num {
  font-weight: 700;
  font-size: 1.2em;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.color-desc {
  padding: 0 18px 16px;
  font-size: 0.88em;
  color: var(--text-secondary);
  line-height: 1.7;
  display: none;
}

.color-desc.open { display: block; }

.chevron {
  transition: transform 0.25s ease;
  flex-shrink: 0;
}
.chevron.open { transform: rotate(180deg); }

.restart-btn {
  display: block;
  margin: 24px auto 0;
  padding: 12px 40px;
  border: 2px solid var(--text);
  border-radius: 50px;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover {
  background: var(--text);
  color: white;
}

/* QR */
.qr-section {
  text-align: center;
  margin-top: 20px;
  padding: 20px;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
}

.qr-section h3 {
  font-family: 'DM Serif Display', serif;
  margin-bottom: 12px;
  font-size: 1.1em;
}

#qrcode {
  display: inline-block;
  padding: 12px;
  background: white;
  border-radius: 10px;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <h1>Kişilik Testi</h1>
    <p>Her satırda sizi en iyi tanımlayan <strong>tek bir ifadeyi</strong> seçin. 40 soru tamamlandığında kişilik renk dağılımınızı göreceksiniz.</p>
  </div>

  <!-- Progress -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 40 tamamlandı</div>
  </div>

  <!-- Questions -->
  <div id="questionsContainer"></div>

  <!-- Submit -->
  <div class="submit-section">
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Sonuçları Gör</button>
    <div class="error-msg hidden" id="errorMsg"></div>
  </div>

  <!-- QR Code -->
  <div class="qr-section" id="qrSection">
    <h3>Bu testi paylaşın</h3>
    <div id="qrcode"></div>
    <p style="margin-top:10px;font-size:0.82em;color:var(--text-secondary)">QR kodu taratarak teste erişebilirsiniz</p>
  </div>
</div>

<!-- Results Overlay -->
<div class="results-overlay hidden" id="resultsOverlay" onclick="closeResults(event)">
  <div class="results-card" onclick="event.stopPropagation()">
    <h2>Sonuçlarınız</h2>
    <div id="resultsContent"></div>
    <button class="restart-btn" onclick="restart()">Testi Tekrarla</button>
  </div>
</div>

// ========== RENDER ==========
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  let html = '';

  html += '<div class="section-divider">Güçlü Yönler (1–20)</div>';

  questions.forEach((q, i) => {
    if (i === 20) {
      html += '<div class="section-divider">Zayıf Yönler (21–40)</div>';
    }

    const colors = ['sari', 'kirmizi', 'mavi', 'yesil'];
    html += `<div class="question-row" id="qrow-${q.q}">
      <div class="q-number"><span>${q.q}</span></div>
      <div class="options-grid">`;

    colors.forEach(c => {
      html += `<div class="option-btn" data-q="${q.q}" data-color="${c}" onclick="selectOption(${q.q},'${c}',this)">${q[c]}</div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function selectOption(qNum, color, el) {
  const row = document.getElementById(`qrow-${qNum}`);
  row.querySelectorAll('.option-btn').forEach(btn => {
    btn.className = 'option-btn';
  });

  el.classList.add(`selected-${color}`);
  answers[qNum] = color;
  row.classList.add('answered');
  row.classList.remove('error');

  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  const pct = (count / 40) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${count} / 40 tamamlandı`;
}

function handleSubmit() {
  const errorMsg = document.getElementById('errorMsg');
  const unanswered = [];

  for (let i = 1; i <= 40; i++) {
    if (!answers[i]) unanswered.push(i);
  }

  if (unanswered.length > 0) {
    errorMsg.classList.remove('hidden');
    errorMsg.textContent = `Lütfen tüm soruları cevaplayın. Eksik: ${unanswered.join(', ')}`;

    unanswered.forEach(q => {
      document.getElementById(`qrow-${q}`).classList.add('error');
    });

    document.getElementById(`qrow-${unanswered[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  errorMsg.classList.add('hidden');
  showResults();
}

function showResults() {
  // Calculate scores
  const scores = { sari: 0, kirmizi: 0, mavi: 0, yesil: 0 };
  for (let i = 1; i <= 40; i++) {
    scores[answers[i]]++;
  }

  // Sort descending
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const keyMap = { sari: 'SARI', kirmizi: 'KIRMIZI', mavi: 'MAVI', yesil: 'YESIL' };

  let html = '';
  sorted.forEach(([key, score], idx) => {
    const desc = descriptions[keyMap[key]];
    const pct = (score / 40) * 100;
    const id = `desc-${key}`;

    html += `
    <div class="color-result">
      <div class="color-result-header" onclick="toggleDesc('${id}','chev-${key}')">
        <div class="color-dot" style="background:${desc.color};position:relative;">
          ${idx + 1}
        </div>
        <div class="color-info">
          <h3 style="color:${desc.color}">${desc.title}</h3>
          <div class="subtitle">${desc.subtitle}</div>
        </div>
        <div class="score-bar-container">
          <div class="score-bar-inner" style="width:${pct}%;background:${desc.color}"></div>
        </div>
        <div class="score-num" style="color:${desc.color}">${score}</div>
        <svg class="chevron" id="chev-${key}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="color-desc ${idx === 0 ? 'open' : ''}" id="${id}">
        ${desc.text}
      </div>
    </div>`;
  });

  // Dominant color summary
  const dominant = descriptions[keyMap[sorted[0][0]]];
  html = `<p style="text-align:center;margin-bottom:20px;font-size:0.92em;color:var(--text-secondary)">
    Baskın renginiz <strong style="color:${dominant.color}">${dominant.title}</strong> (${sorted[0][1]}/40)
  </p>` + html;

  document.getElementById('resultsContent').innerHTML = html;
  document.getElementById('resultsOverlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Open first description by default
  const firstChev = document.getElementById(`chev-${sorted[0][0]}`);
  if (firstChev) firstChev.classList.add('open');
}

function toggleDesc(descId, chevId) {
  const desc = document.getElementById(descId);
  const chev = document.getElementById(chevId);
  desc.classList.toggle('open');
  chev.classList.toggle('open');
}

function closeResults(e) {
  if (e.target === document.getElementById('resultsOverlay')) {
    document.getElementById('resultsOverlay').classList.add('hidden');
    document.body.style.overflow = '';
  }
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.querySelectorAll('.option-btn').forEach(btn => btn.className = 'option-btn');
  document.querySelectorAll('.question-row').forEach(row => {
    row.classList.remove('answered', 'error');
  });
  document.getElementById('resultsOverlay').classList.add('hidden');
  document.body.style.overflow = '';
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== INIT ==========
renderQuestions();

// QR Code - generates for current page URL
try {
  const url = window.location.href;
  if (url && url !== 'about:blank') {
    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 140,
      height: 140,
      colorDark: "#1a1a1a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  }
} catch(e) {
  document.getElementById('qrSection').innerHTML = '<p style="color:var(--text-secondary);font-size:0.85em">QR kod oluşturmak için bu dosyayı bir web sunucusunda açın.</p>';
}
</script>
</body>
</html>
